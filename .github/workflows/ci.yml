name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore src/BusinessRuleEngine.sln

      - name: Build
        run: dotnet build src/BusinessRuleEngine.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/BusinessRuleEngine.sln --no-build --configuration Release --verbosity normal

      - name: Check for vulnerable packages
        run: dotnet list src/BusinessRuleEngine.sln package --vulnerable --include-transitive
