name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/BusinessRuleEngine.sln

      - name: Build
        run: dotnet build src/BusinessRuleEngine.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/BusinessRuleEngine.sln --no-build --configuration Release --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Pack BusinessRuleEngine
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          dotnet pack src/BusinessRuleEngine/BusinessRuleEngine.csproj \
            --no-build \
            --configuration Release \
            -p:Version=${{ steps.semantic.outputs.new_release_version }} \
            --output ./artifacts

      - name: Pack BusinessRuleEngine.Testing.NUnit
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          dotnet pack src/BusinessRuleEngine.Extensions/BusinessRuleEngine.Testing.NUnit.csproj \
            --no-build \
            --configuration Release \
            -p:Version=${{ steps.semantic.outputs.new_release_version }} \
            --output ./artifacts

      - name: Pack BusinessRuleEngine.Testing.XUnit
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          dotnet pack src/BusinessRuleEngine.Testing.XUnit/BusinessRuleEngine.Testing.XUnit.csproj \
            --no-build \
            --configuration Release \
            -p:Version=${{ steps.semantic.outputs.new_release_version }} \
            --output ./artifacts

      - name: Push to NuGet Gallery
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
